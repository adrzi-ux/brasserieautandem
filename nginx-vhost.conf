# brasserieautandem.fr - static Astro build
# Apex -> 301 -> www (canonical = www)

# 1) Apex (brasserieautandem.fr) -> 301 vers www
server {
    listen 80;
    listen 443 ssl;
    server_name brasserieautandem.fr;
    ssl_certificate /etc/ssl/brasserieautandem/fullchain.pem;
    ssl_certificate_key /etc/ssl/brasserieautandem/privkey.pem;
    return 301 https://www.brasserieautandem.fr$request_uri;
}

# 2) www (canonical) -> sert le site
server {
    listen 80;
    listen 443 ssl;
    server_name www.brasserieautandem.fr;
    ssl_certificate /etc/ssl/brasserieautandem/fullchain.pem;
    ssl_certificate_key /etc/ssl/brasserieautandem/privkey.pem;

    root /var/www/brasserieautandem;
    index index.html;

    access_log /var/log/nginx/brasserieautandem-access.log;
    error_log /var/log/nginx/brasserieautandem-error.log;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location = /notre-carte/ { return 301 /notre-brasserie/; }
    location = /diaporama/ { return 301 /; }

    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
